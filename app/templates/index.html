<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Graphiti Chat Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #171a1f;
        --muted: #667085;
        --line: #d9dee7;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --assistant: #eef5ff;
        --user: #eaf7f1;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 16px;
        width: min(1180px, calc(100vw - 32px));
        height: calc(100vh - 32px);
        margin: 16px auto;
      }

      section {
        min-width: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .chat {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      header {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      h1,
      h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.3;
      }

      .subtle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      #messages {
        overflow-y: auto;
        padding: 18px;
      }

      .message {
        width: fit-content;
        max-width: min(720px, 88%);
        margin-bottom: 12px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .message.user {
        margin-left: auto;
        background: var(--user);
      }

      .message.assistant {
        background: var(--assistant);
      }

      form {
        display: flex;
        gap: 10px;
        padding: 14px;
        border-top: 1px solid var(--line);
      }

      textarea {
        flex: 1;
        min-height: 44px;
        max-height: 140px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }

      button {
        align-self: flex-end;
        height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: var(--accent);
        color: white;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      button:hover:not(:disabled) {
        background: var(--accent-strong);
      }

      .facts {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto minmax(0, 1fr);
      }

      .trace-header {
        border-top: 1px solid var(--line);
      }

      #facts,
      #trace {
        overflow-y: auto;
        padding: 14px;
        min-height: 0;
      }

      .fact,
      .trace-item {
        border-bottom: 1px solid var(--line);
        padding: 11px 0;
        font-size: 14px;
        line-height: 1.4;
      }

      .fact:first-child {
        padding-top: 0;
      }

      .trace-item:first-child {
        padding-top: 0;
      }

      .fact-meta,
      .trace-meta {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .empty {
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) 280px;
          height: auto;
          min-height: calc(100vh - 24px);
          width: min(100vw - 24px, 680px);
          margin: 12px auto;
        }

        .chat {
          min-height: 62vh;
        }

        .message {
          max-width: 94%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="chat">
        <header>
          <h1>Graphiti Chat Lab</h1>
          <div class="subtle">Chat backed by SQLite memory retrieval and cliproxy.</div>
        </header>
        <div id="messages"></div>
        <form id="form">
          <textarea
            id="message"
            name="message"
            placeholder="Minh no tao 60k"
            autocomplete="off"
            required
          ></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </section>

      <section class="facts">
        <header>
          <h2>Retrieved Facts</h2>
          <div class="subtle">Facts used for the latest answer.</div>
        </header>
        <div id="facts"><div class="empty">No retrieval yet.</div></div>
        <header class="trace-header">
          <h2>Tool Trace</h2>
          <div class="subtle">Memory actions for the latest answer.</div>
        </header>
        <div id="trace"><div class="empty">No tool calls yet.</div></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#form");
      const input = document.querySelector("#message");
      const send = document.querySelector("#send");
      const messages = document.querySelector("#messages");
      const facts = document.querySelector("#facts");
      const trace = document.querySelector("#trace");

      function addMessage(role, text) {
        const node = document.createElement("div");
        node.className = `message ${role}`;
        node.textContent = text;
        messages.appendChild(node);
        messages.scrollTop = messages.scrollHeight;
      }

      function renderFacts(items) {
        facts.replaceChildren();
        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No facts retrieved.";
          facts.appendChild(empty);
          return;
        }

        for (const item of items) {
          const node = document.createElement("div");
          node.className = "fact";
          const text = document.createElement("div");
          text.textContent = item.fact;
          node.appendChild(text);

          const metaParts = [];
          if (item.valid_at) metaParts.push(`valid ${item.valid_at}`);
          if (item.invalid_at) metaParts.push(`invalid ${item.invalid_at}`);
          if (item.score !== null && item.score !== undefined) metaParts.push(`score ${item.score}`);
          if (metaParts.length) {
            const meta = document.createElement("div");
            meta.className = "fact-meta";
            meta.textContent = metaParts.join(" | ");
            node.appendChild(meta);
          }
          facts.appendChild(node);
        }
      }

      function renderTrace(items) {
        trace.replaceChildren();
        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No tool calls.";
          trace.appendChild(empty);
          return;
        }

        for (const item of items) {
          const node = document.createElement("div");
          node.className = "trace-item";

          const name = document.createElement("div");
          name.textContent = item.name || "(unknown tool)";
          node.appendChild(name);

          const args = document.createElement("div");
          args.className = "trace-meta";
          args.textContent = JSON.stringify(item.arguments || {});
          node.appendChild(args);

          const result = document.createElement("div");
          result.className = "trace-meta";
          result.textContent = item.result || "";
          node.appendChild(result);

          trace.appendChild(node);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;

        addMessage("user", message);
        input.value = "";
        send.disabled = true;

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || response.statusText);
          }

          const data = await response.json();
          addMessage("assistant", data.reply || "(empty reply)");
          renderFacts(data.retrieved_facts || []);
          renderTrace(data.tool_trace || []);
        } catch (error) {
          addMessage("assistant", `Error: ${error.message}`);
        } finally {
          send.disabled = false;
          input.focus();
        }
      });
    </script>
  </body>
</html>
